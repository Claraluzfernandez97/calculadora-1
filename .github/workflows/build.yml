name: Compilar APK con Buildozer

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Redireccionar el código fuente
      uses: actions/checkout@v4

    - name: Configurar Cache de Buildozer
      uses: actions/cache@v4
      with:
        path: .buildozer
        key: ${{ runner.os }}-buildozer-${{ hashFiles('**/buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-

    - name: Instalar dependencias del sistema
      run: |
        sudo apt-get update
        sudo apt-get install -y dpkg-dev cython3 libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
        build-essential libltdl-dev libffi-dev libssl-dev autoconf automake libtool pkg-config cmake \
        git stdint-va-copy.h htop unzip

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Instalar Buildozer
      run: |
        pip3 install --user --upgrade buildozer cython virtualenv

    - name: Compilar con Buildozer (Modo Debug)
      run: |
        export PATH=$PATH:~/.local/bin
        buildozer android debug

    - name: Subir APK generado como Artefacto
      uses: actions/upload-artifact@v4
      with:
        name: Calculadora-APK
        path: bin/*.apk
